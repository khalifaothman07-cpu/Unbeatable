<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KAZ6 — Khalifa Othman</title>
  <meta name="description" content="Khalifa Othman — competitive debater who builds strategy games. Debate, Model UN, content, and IAM GOLF." />
  <link rel="icon" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Saira+Condensed:wght@700;800;900&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/base.css" />
  <link rel="stylesheet" href="css/nav.css" />
  <link rel="stylesheet" href="css/components.css" />
  <link rel="stylesheet" href="css/footer.css" />
</head>
<body>
  <div class="progress" id="progress"></div>
  <nav class="nav" id="nav"></nav>

  <!-- HERO — the headline against an offset image block, then the
       scorewall underneath it. the one signature moment on the site. -->
  <header class="phero">
    <div class="wrap">
      <div class="phero-top">
        <span class="phero-status" data-field="role">Debate · Strategy games — Bahrain</span>
        <span class="phero-loc">Manama · 26.22°N 50.58°E</span>
      </div>

      <div class="hero-row">
        <h1 class="phero-title">Khalifa<br><span class="accent">Othman</span></h1>
        <div class="hero-media">
          <img src="assets/media/hero.jpg" alt="Khalifa Othman"
               onerror="this.closest('.hero-media').classList.add('awaiting')" />
          <span class="hero-media-cap">FIG. 00 — Khalifa Othman</span>
        </div>
      </div>

      <p class="phero-lead" data-field="tagline"></p>

      <!-- SCOREWALL — the signature. everything around it stays quiet. -->
      <div class="scorewall" data-render="hero-scores" aria-label="Games, by the score"></div>

      <div class="phero-actions">
        <a class="btn" href="games.html">See the games</a>
        <a class="btn btn-ghost" href="ventures.html">IAM GOLF</a>
      </div>
    </div>
  </header>

  <!-- keyword marquee -->
  <div class="marquee" aria-hidden="true">
    <div class="marquee-row" data-render="marquee"></div>
  </div>

  <!-- ROUTES — the multi-page map -->
  <section class="section">
    <div class="wrap">
      <p class="eyebrow">Where to look</p>
      <h2 class="section-title">Five ways in</h2>
      <nav class="routes" data-render="routes" aria-label="Site sections"></nav>
    </div>
  </section>

  <!-- THE RECORD — stat ledger for density -->
  <section class="section section--tight">
    <div class="wrap">
      <p class="eyebrow">The record</p>
      <h2 class="section-title">By the numbers</h2>
      <div class="ledger" data-render="stats"></div>
    </div>
  </section>

  <footer class="foot" id="foot"></footer>

  <script src="js/data.js"></script>
  <script src="js/render.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
